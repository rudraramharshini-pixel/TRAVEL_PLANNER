<!DOCTYPE html>
<html>
<head>
    <title>Travel Planner</title>
    <link rel="stylesheet" href="style.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <h1>🌍 Travel Planner</h1>

    <!-- 🌙 Dark Mode -->
    <button onclick="toggleDarkMode()">🌙 Toggle Dark Mode</button>

    <!-- FORM -->
    <div class="card">
        <form id="planner">
            <input type="text" id="destination" placeholder="Enter Destination" required>

            <div id="suggestionsBox"></div>

            <button type="button" onclick="startVoice()">🎤 Speak Destination</button>

            <input type="date" id="date" required>
            <input type="number" id="budget" placeholder="Enter Budget" required>

            <button type="submit">Plan Trip</button>
        </form>
    </div>

    <!-- RESULT -->
    <div class="card">
        <h2>📍 Trip Details</h2>
        <div id="result"></div>
        <p id="weather"></p>
        <p id="suggestion"></p>
        <img id="placeImage" class="place-img">
    </div>

    <!-- MAP -->
    <div class="card">
        <h2>🗺️ Location Map</h2>
        <div id="map"></div>
    </div>

    <!-- SAVED TRIPS -->
    <div class="card">
        <h2>📌 Saved Trips</h2>
        <ul id="tripList"></ul>

        <!-- 🗑️ Clear All -->
        <button onclick="clearTrips()">🗑️ Clear All Trips</button>
    </div>

</div>

<!-- Footer -->
<footer>
    <p>© 2026 Travel Planner | Developed by You 😎</p>
</footer>

<script src="script.js"></script>

</body>
</html>
